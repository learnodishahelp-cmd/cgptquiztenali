<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Quiz - Tenali Rama</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 15px;
    background: #f4f6f8;
}

.container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
}

.question {
    margin-bottom: 15px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    border: none;
    background: #007bff;
    color: white;
    font-size: 16px;
    border-radius: 5px;
}

button:hover {
    background: #0056b3;
}

.result {
    font-weight: bold;
    text-align: center;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
<h2>Vocabulary Quiz</h2>

<form id="quizForm">

<div class="question">
<p>1. What does "witty" mean?</p>
<input type="radio" name="q1" value="0"> Angry<br>
<input type="radio" name="q1" value="1"> Clever and funny<br>
<input type="radio" name="q1" value="0"> Lazy<br>
</div>

<div class="question">
<p>2. What does "skeptical" mean?</p>
<input type="radio" name="q2" value="0"> Trusting<br>
<input type="radio" name="q2" value="1"> Doubting<br>
<input type="radio" name="q2" value="0"> Happy<br>
</div>

<div class="question">
<p>3. What does "absurd" mean?</p>
<input type="radio" name="q3" value="0"> Logical<br>
<input type="radio" name="q3" value="1"> Silly or unreasonable<br>
<input type="radio" name="q3" value="0"> Easy<br>
</div>

<div class="question">
<p>4. What is "cultivation" related to?</p>
<input type="radio" name="q4" value="1"> Farming<br>
<input type="radio" name="q4" value="0"> Cooking<br>
<input type="radio" name="q4" value="0"> Reading<br>
</div>

<button type="button" onclick="checkAnswers()">Submit</button>

</form>

<div class="result" id="result"></div>

</div>

<script>
function checkAnswers() {
    let score = 0;
    let total = 4;

    let answers = document.querySelectorAll('input[type="radio"]:checked');
    
    answers.forEach(answer => {
        score += Number(answer.value);
    });

    document.getElementById("result").innerText =
        "You scored " + score + " out of " + total;
}
</script>

</body>
</html>
